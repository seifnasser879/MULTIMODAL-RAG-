<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DRAGO AI 🐉</title>

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E🐉%3C/text%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0118 0%, #1a0f2e 50%, #0f172a 100%);
            color: #e5e7eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            text-align: center;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.2);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(45deg, #8b5cf6, #ec4899, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
        }

        .header p {
            color: #a78bfa;
            font-size: 13px;
        }

        .memory-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            font-size: 11px;
            color: #a78bfa;
            margin-top: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.02);
            }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .user .avatar {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .assistant .avatar {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .message-content {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .assistant .message-content {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-bottom-left-radius: 4px;
        }

        .message-content.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .timestamp {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
            text-align: right;
        }

        .user .timestamp {
            text-align: left;
        }

        .input-container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 -4px 20px rgba(139, 92, 246, 0.2);
            position: relative;
        }

        /* Realistic Peeking Kitty */
        .peeking-kitty {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 65px;
            pointer-events: none;
            z-index: 1000;
        }

        .kitty-head {
            position: absolute;
            width: 50px;
            height: 45px;
            background: radial-gradient(ellipse at 30% 30%, #ffffff, #f5f5f5 50%, #e8e8e8);
            border-radius: 45% 45% 38% 38%;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 
                0 -3px 15px rgba(0, 0, 0, 0.25),
                inset -2px -2px 4px rgba(0, 0, 0, 0.05);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ear {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 11px solid transparent;
            border-right: 11px solid transparent;
            border-bottom: 18px solid #f5f5f5;
            filter: drop-shadow(0 -2px 3px rgba(0, 0, 0, 0.15));
        }

        .ear-left {
            left: 2px;
            top: -6px;
            transform: rotate(-20deg);
        }

        .ear-right {
            right: 2px;
            top: -6px;
            transform: rotate(20deg);
        }

        .ear-inner {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 11px solid #ffc0d0;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
        }

        .eyes {
            position: absolute;
            width: 100%;
            top: 18px;
            display: flex;
            justify-content: center;
            gap: 14px;
        }

        .eye {
            width: 9px;
            height: 12px;
            background: radial-gradient(ellipse at 35% 30%, #2d3748, #1a202c);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: relative;
            animation: blink 5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 94%, 100% {
                transform: scaleY(1);
            }
            96%, 98% {
                transform: scaleY(0.1);
            }
        }

        .eye-shine {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            box-shadow: 0 0 2px rgba(255, 255, 255, 0.8);
        }

        .nose {
            position: absolute;
            width: 6px;
            height: 5px;
            background: linear-gradient(135deg, #ff85a8, #ff5080);
            border-radius: 50% 50% 50% 50%;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .mouth {
            position: absolute;
            top: 33px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 6px;
        }

        .mouth::before,
        .mouth::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 4px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-top: none;
        }

        .mouth::before {
            left: 0;
            border-right: none;
            border-radius: 0 0 0 6px;
        }

        .mouth::after {
            right: 0;
            border-left: none;
            border-radius: 0 0 6px 0;
        }

        .whiskers {
            position: absolute;
            top: 25px;
            width: 100%;
        }

        .whisker {
            position: absolute;
            width: 20px;
            height: 0.8px;
            background: linear-gradient(90deg, rgba(100, 100, 100, 0.4), transparent);
            opacity: 0.7;
        }

        .whisker-left-1 {
            left: -12px;
            transform: rotate(-25deg);
            top: 0;
        }

        .whisker-left-2 {
            left: -10px;
            transform: rotate(-15deg);
            top: 4px;
        }

        .whisker-left-3 {
            left: -9px;
            transform: rotate(-8deg);
            top: 8px;
        }

        .whisker-right-1 {
            right: -12px;
            transform: rotate(25deg);
            top: 0;
            background: linear-gradient(270deg, rgba(100, 100, 100, 0.4), transparent);
        }

        .whisker-right-2 {
            right: -10px;
            transform: rotate(15deg);
            top: 4px;
            background: linear-gradient(270deg, rgba(100, 100, 100, 0.4), transparent);
        }

        .whisker-right-3 {
            right: -9px;
            transform: rotate(8deg);
            top: 8px;
            background: linear-gradient(270deg, rgba(100, 100, 100, 0.4), transparent);
        }

        .paws {
            position: absolute;
            bottom: -12px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .paw {
            width: 14px;
            height: 20px;
            background: radial-gradient(ellipse at 40% 30%, #ffffff, #f5f5f5 60%, #e8e8e8);
            border-radius: 45% 45% 35% 35%;
            box-shadow: 
                0 3px 8px rgba(0, 0, 0, 0.2),
                inset -1px -2px 3px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* Paw pads */
        .paw::before {
            content: '';
            position: absolute;
            width: 7px;
            height: 8px;
            background: #ffc0d0;
            border-radius: 50% 50% 60% 60%;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
        }

        .paw::after {
            content: '';
            position: absolute;
            width: 9px;
            height: 4px;
            background: #ffc0d0;
            border-radius: 50%;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Toe beans */
        .toe-beans {
            position: absolute;
            top: 3px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 2px;
        }

        .toe-bean {
            width: 2.5px;
            height: 3px;
            background: #ffc0d0;
            border-radius: 50%;
        }

        .fur-detail {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 70%;
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(200, 200, 200, 0.1) 50%,
                transparent 100%);
            border-radius: 50%;
            pointer-events: none;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            padding: 14px 50px 14px 18px;
            font-size: 15px;
            border-radius: 24px;
            border: 2px solid rgba(139, 92, 246, 0.3);
            outline: none;
            background: #0f172a;
            color: #e5e7eb;
            resize: none;
            min-height: 52px;
            max-height: 200px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }

        textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        textarea::placeholder {
            color: #64748b;
        }

        .send-btn {
            position: absolute;
            right: 8px;
            bottom: 8px;
            background: linear-gradient(45deg, #8b5cf6, #ec4899);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
        }

        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-btn {
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #ef4444;
            padding: 12px 20px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            transform: translateY(-2px);
        }

        .welcome-message {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .welcome-message h2 {
            font-size: 28px;
            background: linear-gradient(45deg, #8b5cf6, #ec4899, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .welcome-message p {
            font-size: 16px;
            margin-bottom: 30px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
        }

        .suggestion-chip {
            padding: 10px 18px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            color: #a78bfa;
        }

        .suggestion-chip:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
            color: #e5e7eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 12px;
            margin: 10px auto;
            max-width: 400px;
            font-size: 12px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #a78bfa;
        }

        .stat-value {
            color: #8b5cf6;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .message-content {
                max-width: 85%;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .clear-btn {
                width: 100%;
            }

            .suggestions {
                flex-direction: column;
            }

            .suggestion-chip {
                width: 100%;
                text-align: center;
            }

            .peeking-kitty {
                transform: translateX(-50%) scale(0.8);
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🐉 DRAGO AI 🐉</h1>
    <p>AI-powered knowledge base with dragon's wisdom</p>
    <div class="memory-badge">
        <span>🧠</span>
        <span>Memory Enabled</span>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="welcome-message" id="welcomeMessage">
        <h2>Welcome to DRAGO AI! 🐉✨</h2>
        <p>Your intelligent assistant with the power of dragons</p>
        <div class="suggestions">
            <div class="suggestion-chip" onclick="askSuggestion('What is RAG?')">🔥 What is RAG?</div>
            <div class="suggestion-chip" onclick="askSuggestion('How does vector search work?')">⚡ Vector Search</div>
            <div class="suggestion-chip" onclick="askSuggestion('Explain embeddings')">💎 Explain Embeddings</div>
        </div>
        <div class="stats-bar" style="margin-top: 30px;">
            <div class="stat">
                <span>💬</span>
                <span>Messages: <span class="stat-value" id="messageCount">0</span></span>
            </div>
            <div class="stat">
                <span>🎯</span>
                <span>Session: <span class="stat-value" id="sessionTime">00:00</span></span>
            </div>
        </div>
    </div>
</div>

<div class="input-container">
    <!-- Realistic Peeking Kitty -->
    <div class="peeking-kitty">
        <div class="paws">
            <div class="paw">
                <div class="toe-beans">
                    <div class="toe-bean"></div>
                    <div class="toe-bean"></div>
                    <div class="toe-bean"></div>
                </div>
            </div>
            <div class="paw">
                <div class="toe-beans">
                    <div class="toe-bean"></div>
                    <div class="toe-bean"></div>
                    <div class="toe-bean"></div>
                </div>
            </div>
        </div>
        <div class="kitty-head" id="kittyHead">
            <div class="fur-detail"></div>
            <div class="ear ear-left">
                <div class="ear-inner"></div>
            </div>
            <div class="ear ear-right">
                <div class="ear-inner"></div>
            </div>
            <div class="eyes">
                <div class="eye">
                    <div class="eye-shine"></div>
                </div>
                <div class="eye">
                    <div class="eye-shine"></div>
                </div>
            </div>
            <div class="nose"></div>
            <div class="mouth"></div>
            <div class="whiskers">
                <div class="whisker whisker-left-1"></div>
                <div class="whisker whisker-left-2"></div>
                <div class="whisker whisker-left-3"></div>
                <div class="whisker whisker-right-1"></div>
                <div class="whisker whisker-right-2"></div>
                <div class="whisker whisker-right-3"></div>
            </div>
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-field">
            <textarea
                id="userInput"
                placeholder="Ask DRAGO anything..."
                rows="1"
                onkeydown="handleKeyPress(event)"
                oninput="autoResize(this); trackKittyHead()"
                onclick="trackKittyHead()"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                ▲
            </button>
        </div>
        <button class="clear-btn" onclick="clearChat()">🗑️ Clear Chat</button>
    </div>
</div>

<script>
let messageCount = 0;
let sessionStart = Date.now();
let isProcessing = false;

// Load chat history from localStorage
let chatHistory = JSON.parse(localStorage.getItem('dragoChatHistory') || '[]');

// Session timer
setInterval(() => {
    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    const minutes = Math.floor(elapsed / 60);
    const seconds = elapsed % 60;
    document.getElementById('sessionTime').innerText = 
        `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}, 1000);

// Kitty head tracking based on cursor position
function trackKittyHead() {
    const textarea = document.getElementById('userInput');
    const kittyHead = document.getElementById('kittyHead');
    
    // Get cursor position
    const cursorPos = textarea.selectionStart;
    const textBeforeCursor = textarea.value.substring(0, cursorPos);
    
    // Calculate approximate cursor position in pixels
    const tempSpan = document.createElement('span');
    tempSpan.style.font = window.getComputedStyle(textarea).font;
    tempSpan.style.visibility = 'hidden';
    tempSpan.style.position = 'absolute';
    tempSpan.textContent = textBeforeCursor || '.';
    document.body.appendChild(tempSpan);
    
    const cursorX = tempSpan.offsetWidth;
    document.body.removeChild(tempSpan);
    
    // Get textarea bounds
    const textareaRect = textarea.getBoundingClientRect();
    const textareaCenter = textareaRect.width / 2;
    
    // Calculate rotation based on cursor position relative to textarea center
    // Map cursor position to rotation (-15deg to +15deg)
    const relativePos = cursorX - (textarea.scrollLeft || 0);
    const normalizedPos = (relativePos / textareaRect.width) * 2 - 1; // -1 to 1
    const rotation = normalizedPos * 15; // -15 to 15 degrees
    
    // Also calculate slight tilt
    const tilt = Math.sin(Date.now() / 200) * 3;
    
    // Apply smooth transformation
    kittyHead.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
    
    // Add subtle scale based on typing
    if (textBeforeCursor.length > 0) {
        kittyHead.style.transform = `translateX(-50%) rotate(${rotation}deg) scale(1.05)`;
        setTimeout(() => {
            kittyHead.style.transform = `translateX(-50%) rotate(${rotation}deg) scale(1)`;
        }, 100);
    }
}

// Load previous chat on page load
window.addEventListener('load', () => {
    if (chatHistory.length > 0) {
        document.getElementById('welcomeMessage').style.display = 'none';
        chatHistory.forEach(msg => {
            addMessage(msg.text, msg.type, false);
        });
        messageCount = chatHistory.filter(m => m.type === 'user').length;
        document.getElementById('messageCount').innerText = messageCount;
    }
    document.getElementById('userInput').focus();
});

function autoResize(textarea) {
    textarea.style.height = 'auto';
    textarea.style.height = textarea.scrollHeight + 'px';
}

function handleKeyPress(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
    }
}

function askSuggestion(question) {
    document.getElementById('userInput').value = question;
    sendMessage();
}

function addMessage(text, type, saveToHistory = true) {
    const chatContainer = document.getElementById('chatContainer');
    const welcomeMsg = document.getElementById('welcomeMessage');
    
    if (welcomeMsg) {
        welcomeMsg.style.display = 'none';
    }

    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${type}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.innerText = type === 'user' ? '👤' : '🐉';

    const contentDiv = document.createElement('div');
    contentDiv.className = `message-content ${type === 'error' ? 'error' : ''}`;
    
    if (type === 'typing') {
        const typingIndicator = document.createElement('div');
        typingIndicator.className = 'typing-indicator';
        typingIndicator.innerHTML = '<span></span><span></span><span></span>';
        contentDiv.appendChild(typingIndicator);
    } else {
        contentDiv.innerText = text;
        
        const timestamp = document.createElement('div');
        timestamp.className = 'timestamp';
        timestamp.innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        contentDiv.appendChild(timestamp);
    }

    messageDiv.appendChild(avatar);
    messageDiv.appendChild(contentDiv);
    chatContainer.appendChild(messageDiv);

    // Smooth scroll to bottom
    setTimeout(() => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }, 100);

    // Save to history
    if (saveToHistory && type !== 'typing') {
        chatHistory.push({ text, type, timestamp: Date.now() });
        localStorage.setItem('dragoChatHistory', JSON.stringify(chatHistory));
    }
}

function removeTypingIndicator() {
    const typingMessages = document.querySelectorAll('.message.typing');
    typingMessages.forEach(msg => msg.remove());
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    
    if (!message || isProcessing) return;

    isProcessing = true;
    document.getElementById('sendBtn').disabled = true;

    // Add user message
    addMessage(message, 'user');
    input.value = '';
    input.style.height = 'auto';
    
    // Reset kitty position
    const kittyHead = document.getElementById('kittyHead');
    kittyHead.style.transform = 'translateX(-50%) rotate(0deg)';

    messageCount++;
    document.getElementById('messageCount').innerText = messageCount;

    // Show typing indicator
    addMessage('', 'typing', false);

    const startTime = Date.now();

    try {
        const response = await fetch(
            `http://localhost:8000/query?question=${encodeURIComponent(message)}`
        );

        removeTypingIndicator();

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        const responseTime = ((Date.now() - startTime) / 1000).toFixed(2);

        // Add assistant response
        addMessage(data.answer || data.error || 'No response received', 'assistant');

    } catch (error) {
        removeTypingIndicator();
        
        const errorMessage = `❌ Connection Error\n\nCouldn't reach the backend server at http://localhost:8000\n\nPlease make sure your DRAGO AI server is running.`;
        addMessage(errorMessage, 'error');
    }

    isProcessing = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
}

function clearChat() {
    if (confirm('Clear all chat history? This cannot be undone.')) {
        chatHistory = [];
        localStorage.removeItem('dragoChatHistory');
        
        const chatContainer = document.getElementById('chatContainer');
        chatContainer.innerHTML = `
            <div class="welcome-message" id="welcomeMessage">
                <h2>Welcome to DRAGO AI! 🐉✨</h2>
                <p>Your intelligent assistant with the power of dragons</p>
                <div class="suggestions">
                    <div class="suggestion-chip" onclick="askSuggestion('What is RAG?')">🔥 What is RAG?</div>
                    <div class="suggestion-chip" onclick="askSuggestion('How does vector search work?')">⚡ Vector Search</div>
                    <div class="suggestion-chip" onclick="askSuggestion('Explain embeddings')">💎 Explain Embeddings</div>
                </div>
                <div class="stats-bar" style="margin-top: 30px;">
                    <div class="stat">
                        <span>💬</span>
                        <span>Messages: <span class="stat-value" id="messageCount">0</span></span>
                    </div>
                    <div class="stat">
                        <span>🎯</span>
                        <span>Session: <span class="stat-value" id="sessionTime">00:00</span></span>
                    </div>
                </div>
            </div>
        `;
        
        messageCount = 0;
        sessionStart = Date.now();
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
